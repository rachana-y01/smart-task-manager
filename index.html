<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart To-Do List</title>
    <!-- Add PWA support -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6c5ce7">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header>
            <h1><i class="fas fa-check-double"></i> Smart Task Manager</h1>
            <button id="theme-toggle" class="icon-btn" aria-label="Toggle Dark Mode">
                <i class="fas fa-moon"></i>
            </button>
        </header>

        <!-- Input Section -->
        <form id="task-form" class="task-form">
            <input type="text" id="task-input" placeholder="What needs to be done?" autocomplete="off">
            
            <div class="form-options">
                <select id="task-category">
                    <option value="Personal">Personal</option>
                    <option value="Work">Work</option>
                    <option value="Study">Study</option>
                </select>

                <select id="task-priority">
                    <option value="Low">Low Priority</option>
                    <option value="Medium">Medium Priority</option>
                    <option value="High">High Priority</option>
                </select>

                <input type="date" id="task-date">
                
                <button type="submit" id="add-btn" class="primary-btn">
                    <i class="fas fa-plus"></i> Add
                </button>
            </div>
        </form>

        <!-- Progress Bar -->
        <div class="progress-container">
            <div class="progress-text">Completed: <span id="progress-text">0/0</span> tasks</div>
            <div class="progress-bar-wrap">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
        </div>

        <!-- Search and Filters Section -->
        <div class="search-container">
            <input type="text" id="search-input" placeholder="🔍 Search tasks...">
        </div>
        
        <!-- Advanced Actions -->
        <div class="advanced-actions">
            <select id="sort-select">
                <option value="manual">Custom</option>
                <option value="newest">Sort by Newest</option>
                <option value="oldest">Sort by Oldest</option>
                <option value="priority">Sort by Priority</option>
                <option value="deadline">Sort by Deadline</option>
            </select>
            
            <select id="category-filter">
                <option value="all">All Categories</option>
                <option value="Personal">Personal</option>
                <option value="Work">Work</option>
                <option value="Study">Study</option>
            </select>

            <button id="complete-all-btn" class="secondary-btn"><i class="fas fa-check-double"></i> Complete All</button>
            <button id="export-btn" class="secondary-btn"><i class="fas fa-download"></i> Export</button>
            <input type="file" id="import-input" accept=".json" style="display: none;">
            <button id="import-btn" class="secondary-btn" onclick="document.getElementById('import-input').click()"><i class="fas fa-upload"></i> Import</button>
        </div>

        <div class="filters">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="pending">Pending</button>
            <button class="filter-btn" data-filter="completed">Completed</button>
        </div>

        <!-- Task List -->
        <ul id="task-list" class="task-list">
            <!-- Tasks will be injected here via JavaScript -->
        </ul>
        
        <footer>
            <p>© 2026 Rachana Yadav • Built with ❤️ </p>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker Registered'))
                    .catch(err => console.log('Service Worker Error', err));
            });
        }
    </script>
</body>
</html>
